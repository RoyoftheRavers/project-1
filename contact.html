<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — My Website</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <div id="nav-placeholder"></div>

    <section class="hero">
      <h1>Get in touch</h1>
      <p class="hero-subtitle">Have a question or just want to say hello? I'd love to hear from you.</p>
    </section>

    <section class="contact-wrapper">

  <div class="contact-details">
    <h2>Contact details</h2>
    <p>Based in Dublin, Ireland.</p>
    <p>Feel free to reach out about anything on the site — football, music, GAA, or web development.</p>
    <p>
      <a href="mailto:you@email.com">you@email.com</a>
    </p>
  </div>

  <form class="contact-form">
    <div class="form-group">
      <label for="name">Your name</label>
      <input type="text" id="name" name="name" placeholder="John Smith" />
    </div>

    <div class="form-group">
      <label for="email">Your email</label>
      <input type="email" id="email" name="email" placeholder="john@email.com" />
    </div>

    <div class="form-group">
      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" placeholder="What's it about?" />
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" placeholder="Your message here..."></textarea>
    </div>

    <button type="submit" class="btn">Send message</button>
  </form>

</section>

    <div id="footer-placeholder"></div>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
